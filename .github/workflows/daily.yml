name: daily-update

# Runs ~06:00 UTC = ~09:00 Israel time during the 2026 World Cup (Jun–Jul = IDT,
# UTC+3, so no daylight-saving drift in the tournament window). We use :17 rather
# than :00 because GitHub's scheduled runs are best-effort and the top of the
# hour is heavily congested (frequent delays/skips); an off-peak minute is far
# more reliable. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "17 6 * * *"
    - cron: "17 8 * * *"   # safety net: if the 06:17 run was skipped, this catches up (job is idempotent)
  workflow_dispatch:

# NOTE: scheduled workflows only fire from the repository's DEFAULT branch, so
# this must live on `main` (or whatever you set as default) to run automatically.

permissions:
  contents: write   # commit refreshed data + the regenerated page back

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Fetch bookmaker odds from The Odds API (fail-soft)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_odds.py || true

      - name: Refresh results, update Elo + forward log
        run: python scripts/predict_fixtures.py --refresh

      - name: Regenerate the page and the matchup report
        run: |
          python scripts/build_site.py
          python scripts/report_upcoming.py

      - name: Commit changes
        run: |
          git config user.name "wc2026-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/external data/raw docs reports
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "daily update $(date -u +%F)"
            git push
          fi
